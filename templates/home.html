{% extends "base.html" %}

{% block title %}Personal Todo List{% endblock title %}

{% block content %}
<h2>Todo List</h2>
<h2>Name of Thing Todo:</h2>
    <ul>
        {% for todo in todos %}
            <li>{{ todo.name }} {{ todo.complete_by }}</li>
        {% endfor %}
    </ul>
{% endblock content %}
