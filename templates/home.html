{% extends "base.html" %}

{% block title %}Personal Todo List{% endblock title %}

{% block content %}
<h1 style="margin-top: 60px;">Todo List</h1>
<h3>Current Todos:</h3>
    <ul>
        {% for todo in todo_list %}
            <li>{{ todo.name }} - {{ todo.complete_by }}</li>
        {% endfor %}
    </ul>
{% endblock content %}
